<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b4788"/>
      <stop offset="100%" stop-color="#056a78"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a8f1fb"/>
      <stop offset="100%" stop-color="#31cde4"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- K letter -->
  <text x="10" y="48" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="url(#accent)">K</text>
  <!-- Small plus accent -->
  <circle cx="50" cy="16" r="7" fill="url(#accent)" opacity="0.9"/>
  <rect x="47" y="13" width="6" height="2" rx="1" fill="#0b4788"/>
  <rect x="49" y="11" width="2" height="6" rx="1" fill="#0b4788"/>
</svg>
